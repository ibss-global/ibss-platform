<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IBSS Signals System</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
}

.container {
  padding:20px;
  max-width:900px;
  margin:auto;
}

h1 {
  text-align:center;
  color:#d4af37;
}

.stats {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin:20px 0;
}

.card {
  background:#111;
  padding:15px;
  border-radius:10px;
  border:1px solid #333;
}

.signal {
  background:#111;
  margin:15px 0;
  padding:15px;
  border-radius:12px;
  border:1px solid #333;
}

.tag {
  display:inline-block;
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
  margin-right:5px;
}

.high { background:#8b0000; }
.medium { background:#b8860b; }
.low { background:#006400; }

.published { background:#006666; }
.pending { background:#444; }

</style>
</head>

<body>

<div class="container">

<h1>IBSS Signals System</h1>

<div class="stats">
  <div class="card">Top Signal: Gaza</div>
  <div class="card">Live Signals: 5</div>
  <div class="card">High Priority: 2</div>
  <div class="card">Dominant: Structural</div>
</div>

<div id="signals"></div>

</div>

<script>

const signals = [
{
  title:"Gaza Structure",
  weight:"high",
  region:"Gaza",
  status:"published",
  type:"Structural",
  score:85
},
{
  title:"Lebanon Pressure",
  weight:"high",
  region:"Levant",
  status:"published",
  type:"Military",
  score:87
},
{
  title:"Iran Negotiations",
  weight:"medium",
  region:"Global",
  status:"published",
  type:"Diplomatic",
  score:61
},
{
  title:"Red Sea Tension",
  weight:"low",
  region:"Maritime",
  status:"pending",
  type:"Maritime",
  score:34
},
{
  title:"West Bank Escalation",
  weight:"low",
  region:"West Bank",
  status:"pending",
  type:"Internal",
  score:29
}
];

function render(){
  const container = document.getElementById("signals");
  container.innerHTML = "";

  signals.forEach(s => {
    container.innerHTML += `
    <div class="signal">
      <div>
        <span class="tag ${s.weight}">${s.weight.toUpperCase()}</span>
        <span class="tag">${s.region}</span>
        <span class="tag ${s.status}">${s.status}</span>
      </div>

      <h3>${s.title}</h3>

      <p>Type: ${s.type}</p>
      <p>Score: ${s.score}</p>

    </div>
    `;
  });
}

render();

</script>

</body>
</html>
