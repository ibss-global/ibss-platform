<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IBSS Dashboard</title>

<style>
:root{
  --gold:#d4af37;
  --bg:#040404;
  --panel:#0d0d0d;
  --text:#fff;
  --red:#ff4d4f;
  --orange:#ff9f1a;
  --green:#00d084;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

.wrap{
  width:92%;
  max-width:1100px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
  color:var(--gold);
}

.card{
  background:var(--panel);
  padding:18px;
  border-radius:14px;
  margin:14px 0;
  border:1px solid #222;
}

.high{color:var(--red)}
.medium{color:var(--orange)}
.low{color:var(--green)}

.alert{
  display:none;
  background:#5a1111;
  padding:14px;
  border-radius:10px;
  margin:14px 0;
  text-align:center;
  font-weight:bold;
}

.radar{
  position:relative;
  height:240px;
}

.circle{
  position:absolute;
  border:1px solid rgba(212,175,55,0.2);
  border-radius:50%;
}

.c1{width:80px;height:80px;top:80px;left:80px;}
.c2{width:140px;height:140px;top:50px;left:50px;}
.c3{width:200px;height:200px;top:20px;left:20px;}

.dot{
  width:10px;
  height:10px;
  background:var(--gold);
  border-radius:50%;
  position:absolute;
  box-shadow:0 0 10px var(--gold);
}

.feed{
  margin-top:10px;
}

.signal-box{
  border:1px solid rgba(212,175,55,0.3);
  padding:14px;
  border-radius:12px;
}

</style>
</head>

<body>

<div class="wrap">

<h1>IBSS Dashboard</h1>

<div id="alertBox" class="alert"></div>

<div class="card">
  <div>Level: <span id="level">-</span></div>
  <div>SSI: <span id="ssi">-</span></div>
  <div>Decision: <span id="decision">-</span></div>
</div>

<div class="card signal-box">
  <h3>Primary Signal</h3>
  <div id="signalTitle"></div>
  <p id="signalDesc"></p>
</div>

<div class="card">
  <h3>Radar</h3>
  <div class="radar" id="radar">
    <div class="circle c1"></div>
    <div class="circle c2"></div>
    <div class="circle c3"></div>
  </div>
</div>

<div class="card">
  <h3>Live Feed</h3>
  <div id="feed" class="feed"></div>
</div>

</div>

<script src="data.js"></script>

<script>

let liveSSI = 70;

function getLiveSystemFromSSI(ssi){

  let level="LOW";
  let decision="WATCH";
  let scenarios=[22,33,45];

  if(ssi>=75){
    level="HIGH";
    decision="ACT";
    scenarios=[60,25,15];
  }else if(ssi>=50){
    level="MEDIUM";
    decision="PRD";
    scenarios=[40,35,25];
  }

  return {
    ssi,
    level,
    decision,
    scenarios,
    dominantSignal:getDominantSignal()
  };
}

function saveLiveSystem(system){
  localStorage.setItem("ibss_live_system", JSON.stringify({
    ssi: system.ssi,
    level: system.level,
    decision: system.decision,
    dominantSignalId: system.dominantSignal.id
  }));
}

function setLevel(level){
  const el=document.getElementById("level");
  el.textContent=level;
  el.className=level.toLowerCase();

  const alertBox=document.getElementById("alertBox");

  if(level==="HIGH"){
    alertBox.style.display="block";
    alertBox.textContent="⚠ HIGH ESCALATION — ACTIVE RESPONSE";
  }else{
    alertBox.style.display="none";
  }
}

function setPrimarySignal(signal){
  document.getElementById("signalTitle").textContent=signal.title.en;
  document.getElementById("signalDesc").textContent=signal.description.en;
}

function moveRadar(){
  const radar=document.getElementById("radar");

  radar.querySelectorAll(".dot").forEach(d=>d.remove());

  for(let i=0;i<4;i++){
    const dot=document.createElement("div");
    dot.className="dot";
    dot.style.left=Math.random()*200+"px";
    dot.style.top=Math.random()*200+"px";
    radar.appendChild(dot);
  }
}

function setFeed(){
  const feed=document.getElementById("feed");

  const signals=getRankedSignals().slice(0,4);

  feed.innerHTML=signals.map(s=>
    `<div>• ${s.title.en} — ${s.decisionMode.en}</div>`
  ).join("");
}

function tick(){

  const delta=Math.floor(Math.random()*7)-3;
  liveSSI+=delta;

  if(liveSSI>90) liveSSI=90;
  if(liveSSI<40) liveSSI=40;

  const system=getLiveSystemFromSSI(liveSSI);

  document.getElementById("ssi").textContent=system.ssi;
  document.getElementById("decision").textContent=system.decision;

  setLevel(system.level);
  setPrimarySignal(system.dominantSignal);
  moveRadar();
  setFeed();
  saveLiveSystem(system);
}

setInterval(tick,3000);
tick();

</script>

</body>
</html>
