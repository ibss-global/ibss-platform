let currentLang = localStorage.getItem("ibss_lang") || "en";
let previousSSI = null;

function txt(key){
  return ui[currentLang][key] || key;
}

function safeText(value, fallback = "-"){
  return typeof value === "string" && value.trim() ? value : fallback;
}

function setLang(lang){
  currentLang = lang;
  localStorage.setItem("ibss_lang", lang);
  applyTranslations();
  renderDashboard();
}

function applyTranslations(){
  document.documentElement.lang = currentLang;
  document.documentElement.dir = currentLang === "ar" ? "rtl" : "ltr";

  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
    el.textContent = txt(key);
  });

  document.getElementById("btn-en").classList.toggle("active", currentLang === "en");
  document.getElementById("btn-ar").classList.toggle("active", currentLang === "ar");

  document.getElementById("pageTitle").textContent = txt("title");
  document.getElementById("pageSub").textContent = txt("sub");
  document.getElementById("stateTitle").textContent = txt("state");
  document.getElementById("levelLabel").textContent = txt("level");
  document.getElementById("ssiLabel").textContent = txt("ssi");
  document.getElementById("decisionLabel").textContent = txt("decision");
  document.getElementById("modeLabel").textContent = txt("mode");
  document.getElementById("signalTitleLabel").textContent = txt("signal");
  document.getElementById("radarTitle").textContent = txt("radar");
  document.getElementById("feedTitle").textContent = txt("feed");
  document.getElementById("trendTitle").textContent = txt("trendTitle");
  document.getElementById("reasonTitle").textContent = txt("reasonTitle");
  document.getElementById("scenarioTitle").textContent = txt("scenarioTitle");
}

function checkBootStatus(){
  const hasData = Array.isArray(window.IBSS_SIGNALS) && window.IBSS_SIGNALS.length > 0;
  const hasEngine = !!(
    window.IBSS_ENGINE &&
    typeof window.IBSS_ENGINE.getCurrentState === "function"
  );

  const banner = document.getElementById("bootBanner");

  if (!hasData) {
    banner.className = "boot-banner error";
    banner.textContent = txt("bootNoData");
    return false;
  }

  if (!hasEngine) {
    banner.className = "boot-banner error";
    banner.textContent = txt("bootNoEngine");
    return false;
  }

  banner.className = "boot-banner ready";
  banner.textContent = txt("bootReady");
  return true;
}

function renderLevel(level, ssi){
  const levelEl = document.getElementById("level");
  const ssiEl = document.getElementById("ssi");
  const alertBox = document.getElementById("alertBox");

  ssiEl.textContent = Number.isFinite(ssi) ? ssi : 0;

  if(level === "HIGH"){
    levelEl.textContent = txt("levelHigh");
    levelEl.className = "value high";
    ssiEl.className = "value high";
    alertBox.style.display = "block";
    alertBox.innerHTML = txt("highAlert") + "<br>" + txt("alertWhyHigh");
  } else if(level === "MEDIUM"){
    levelEl.textContent = txt("levelMed");
    levelEl.className = "value medium";
    ssiEl.className = "value medium";
    alertBox.style.display = "block";
    alertBox.innerHTML = txt("medAlert") + "<br>" + txt("alertWhyMed");
  } else {
    levelEl.textContent = txt("levelLow");
    levelEl.className = "value low";
    ssiEl.className = "value low";
    alertBox.style.display = "block";
    alertBox.innerHTML = txt("lowAlert") + "<br>" + txt("alertWhyLow");
  }
}

function renderDecision(system){
  const decisionEl = document.getElementById("decision");
  const decisionWord = document.getElementById("decisionWord");
  const decisionNote = document.getElementById("decisionNote");
  const modeEl = document.getElementById("mode");

  if(system.level === "HIGH"){
    decisionEl.textContent = txt("decisionHigh");
    decisionWord.textContent = txt("decisionHigh");
    decisionNote.textContent = txt("noteHigh");
    modeEl.textContent = txt("modeHigh");
  } else if(system.level === "MEDIUM"){
    decisionEl.textContent = txt("decisionMed");
    decisionWord.textContent = txt("decisionMed");
    decisionNote.textContent = txt("noteMedium");
    modeEl.textContent = txt("modeMed");
  } else {
    decisionEl.textContent = txt("decisionLow");
    decisionWord.textContent = txt("decisionLow");
    decisionNote.textContent = txt("noteLow");
    modeEl.textContent = txt("modeLow");
  }
}

function renderPrimarySignal(system){
  const titleEl = document.getElementById("signalTitle");
  const descEl = document.getElementById("signalDesc");

  const signal = system.topSignal;
  if (!signal) {
    titleEl.textContent = "-";
    descEl.textContent = "-";
    return;
  }

  titleEl.textContent = safeText(signal.title?.[currentLang], signal.id || "-");
  descEl.textContent = safeText(signal.description?.[currentLang], "-");
}

function renderTrends(system){
  const box = document.getElementById("trendBox");
  const currentSSI = system.ssi ?? 0;
  const prev = previousSSI ?? currentSSI;

  let trendText = txt("trendFlat");
  let trendClass = "trend-flat";

  if (currentSSI > prev) {
    trendText = txt("trendUp");
    trendClass = "trend-up";
  } else if (currentSSI < prev) {
    trendText = txt("trendDown");
    trendClass = "trend-down";
  }

  box.innerHTML = `
    <div class="trend-row">
      <span class="trend-key">${txt("trendPrev")}</span>
      <span class="trend-val">${prev}</span>
    </div>
    <div class="trend-row">
      <span class="trend-key">${txt("trendNow")}</span>
      <span class="trend-val">${currentSSI}</span>
    </div>
    <div class="trend-row">
      <span class="trend-key">${txt("trendDir")}</span>
      <span class="trend-val ${trendClass}">${trendText}</span>
    </div>
  `;

  previousSSI = currentSSI;
}

function renderReasons(system){
  const box = document.getElementById("reasonBox");
  const signal = system.topSignal;

  box.innerHTML = `
    <div class="reason-row">
      <span class="reason-key">${txt("reasonPrimary")}</span>
      <span class="reason-val">${safeText(signal?.title?.[currentLang], "-")}</span>
    </div>
    <div class="reason-row">
      <span class="reason-key">${txt("reasonSecondary")}</span>
      <span class="reason-val">${safeText(system.mode, "-")}</span>
    </div>
  `;
}

function renderScenarios(system){
  const box = document.getElementById("scenarioBox");
  const scenarios = Array.isArray(system.scenarios) ? system.scenarios : [];

  const fallbackLabels = ["A", "B", "C"];

  box.innerHTML = scenarios.map((item, index) => {
    const label = item.label || fallbackLabels[index] || "?";
    const title = item.title || "-";
    const probability = item.probability ?? item ?? 0;

    return `
      <div class="scenario-row">
        <span class="scenario-key">${txt("scenario" + label)}</span>
        <span class="scenario-val">${title} — ${probability}%</span>
      </div>
    `;
  }).join("");
}

function renderFeed(system){
  const box = document.getElementById("feed");
  const signals = Array.isArray(system.rankedSignals) ? system.rankedSignals.slice(0, 3) : [];

  box.innerHTML = signals.map(signal => `
    <div class="feed-item">
      <div class="label">${safeText(signal.layer?.[currentLang], "Signal")}</div>
      <div class="value" style="font-size:18px">${safeText(signal.title?.[currentLang], "-")}</div>
    </div>
  `).join("");
}

function renderRadar(system){
  const radar = document.getElementById("radar");
  const legend = document.getElementById("radarLegend");

  radar.querySelectorAll(".radar-signal").forEach(el => el.remove());

  const signals = Array.isArray(system.rankedSignals) ? system.rankedSignals.slice(0, 5) : [];
  const positions = [
    { x: 140, y: 42 },
    { x: 224, y: 98 },
    { x: 198, y: 210 },
    { x: 82, y: 210 },
    { x: 54, y: 112 }
  ];

  legend.innerHTML = "";

  signals.forEach((signal, index) => {
    const pos = positions[index] || { x: 140, y: 140 };
    const size = Math.max(10, Math.min(24, Math.round((window.IBSS_ENGINE.scoreSignal(signal) / 100) * 24)));

    const dot = document.createElement("div");
    const levelClass =
      signal.weight === "HIGH" ? "high" :
      signal.weight === "MEDIUM" ? "medium" : "low";

    dot.className = `radar-signal ${levelClass} ${signal.id === system.topSignal?.id ? "dominant" : ""}`;
    dot.style.left = pos.x + "px";
    dot.style.top = pos.y + "px";
    dot.style.width = size + "px";
    dot.style.height = size + "px";
    radar.appendChild(dot);

    const score = window.IBSS_ENGINE.scoreSignal(signal);

    legend.innerHTML += `
      <div class="legend-item">
        <div class="legend-left">
          <span class="legend-dot ${levelClass}" style="background:currentColor;"></span>
          <span class="legend-name">${safeText(signal.title?.[currentLang], signal.id)}</span>
        </div>
        <span class="legend-meta">${score}</span>
      </div>
    `;
  });
}

function renderDashboard(){
  if (!checkBootStatus()) return;

  let system = null;

  try {
    system = window.IBSS_ENGINE.getCurrentState();
  } catch (e) {
    console.error(e);
    system = null;
  }

  if (!system || typeof system !== "object") {
    document.getElementById("bootBanner").className = "boot-banner error";
    document.getElementById("bootBanner").textContent = txt("bootBadState");
    return;
  }

  renderLevel(system.level, system.ssi);
  renderDecision(system);
  renderPrimarySignal(system);
  renderTrends(system);
  renderReasons(system);
  renderScenarios(system);
  renderFeed(system);
  renderRadar(system);
}

document.addEventListener("DOMContentLoaded", () => {
  applyTranslations();
  renderDashboard();
});
</script>
