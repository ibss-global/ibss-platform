<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IBSS — Command Center</title>

<style>
:root{
  --gold:#d4af37;
  --bg:#050505;
  --panel:#0e0e0e;
  --panel2:#141414;
  --text:#ffffff;
  --muted:#9a9a9a;
  --red:#ff4d4f;
  --orange:#ff9f1a;
  --green:#00d084;
  --blue:#5a8cff;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

.wrap{
  width:95%;
  max-width:1300px;
  margin:auto;
  padding:20px 0;
}

/* TOP */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.brand{
  color:var(--gold);
  font-size:26px;
  font-weight:900;
}

/* HERO */
.hero{
  text-align:center;
  margin-bottom:20px;
}

.hero h1{
  color:var(--gold);
  font-size:36px;
}

.hero p{
  color:var(--muted);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

.card{
  background:var(--panel);
  padding:16px;
  border-radius:14px;
}

/* VALUES */
.value{
  font-size:22px;
  font-weight:900;
}

.high{color:var(--red)}
.medium{color:var(--orange)}
.low{color:var(--green)}

/* FEED */
.feed-item{
  background:var(--panel2);
  padding:10px;
  margin-bottom:8px;
  border-radius:10px;
}

/* BUTTONS */
.btn{
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.primary{
  background:var(--gold);
  color:#000;
}

.secondary{
  background:#222;
  color:#fff;
}

/* TEXTAREA */
textarea{
  width:100%;
  height:160px;
  margin-top:10px;
  background:#111;
  color:#fff;
  border:none;
  padding:10px;
}

</style>
</head>

<body>

<div class="wrap">

<!-- HEADER -->
<div class="topbar">
  <div class="brand">IBSS</div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Command Center</h1>
  <p>Living System Interface</p>
</div>

<!-- STATE -->
<div class="grid">

  <div class="card">
    <div>System Pressure</div>
    <div id="ssi" class="value">0</div>
  </div>

  <div class="card">
    <div>Decision</div>
    <div id="decision" class="value">-</div>
  </div>

</div>

<!-- SIGNAL -->
<div class="card" style="margin-top:16px;">
  <h3>Top Signal</h3>
  <div id="signalTitle">-</div>
  <div id="signalDesc" style="color:var(--muted);margin-top:6px;"></div>
</div>

<!-- FEED -->
<div class="card" style="margin-top:16px;">
  <h3>Live Feed</h3>
  <div id="feed"></div>
</div>

<!-- PUBLISHER -->
<div class="card" style="margin-top:16px;">
  <h3>Publisher</h3>

  <textarea id="draft"></textarea>

  <div style="margin-top:10px;display:flex;gap:10px;">
    <button class="btn primary" id="genSignal">Signal</button>
    <button class="btn secondary" id="genBrief">Brief</button>
  </div>
</div>

</div>
<script src="data.js"></script>
<script src="sources.js"></script>
<script src="ingestion.js"></script>
<script src="news.js"></script>
<script src="analysis.js"></script>
<script src="metrics-engine.js"></script>
<script src="cluster-engine.js"></script>
<script src="engine.js"></script>
<script src="audio-engine.js"></script>
<script src="runtime-engine.js"></script>
<script src="viral-engine.js"></script>
<script src="publisher.js"></script>
<script src="facebook-publisher-layer.js"></script>

<script>
(function(){
  "use strict";

  function el(id){
    return document.getElementById(id);
  }

  function asArray(v){
    return Array.isArray(v) ? v : [];
  }

  function safeNumber(v,f=0){
    const n = Number(v);
    return Number.isFinite(n) ? n : f;
  }

  function text(v){
    if(!v) return "-";
    if(typeof v === "string" || typeof v === "number") return String(v);
    return v.en || v.ar || v.title || v.name || v.label || v.text || "-";
  }

  function levelClass(score){
    const n = safeNumber(score,0);
    if(n >= 70) return "high";
    if(n >= 35) return "medium";
    return "low";
  }

  function getRawSystem(){
    try{
      if(window.IBSS_ENGINE?.getSystemState){
        return window.IBSS_ENGINE.getSystemState();
      }
      if(window.IBSS_ENGINE?.getStaticSystemFallback){
        return window.IBSS_ENGINE.getStaticSystemFallback();
      }
    }catch(e){
      console.error("IBSS dashboard raw system error", e);
    }
    return null;
  }

  function getSystem(){
    const raw = getRawSystem();
    if(!raw) return null;

    try{
      if(window.IBSS_PUBLISHER?.orchestrateSystem){
        return window.IBSS_PUBLISHER.orchestrateSystem(raw) || raw;
      }
    }catch(e){
      console.error("IBSS publisher orchestration error", e);
    }

    return raw;
  }

  function renderState(system){
    const pressure = safeNumber(system.systemPressure ?? system.ssi,0);

    el("ssi").textContent = pressure;
    el("ssi").className = "value " + levelClass(pressure);

    el("decision").textContent = system.decision || system.mode || "MONITORING";
  }

  function renderSignal(system){
    const signal = system.topSignal || system.dominantSignal || asArray(system.rankedSignals)[0];

    if(!signal){
      el("signalTitle").textContent = "No signal";
      el("signalDesc").textContent = "";
      return;
    }

    el("signalTitle").textContent = text(signal.title);
    el("signalDesc").textContent = text(signal.description || signal.summary);
  }

  function renderFeed(system){
    const feed =
      asArray(system.publisherFeed).length ? system.publisherFeed :
      asArray(system.unifiedFeed).length ? system.unifiedFeed :
      asArray(system.feed);

    if(!feed.length){
      el("feed").innerHTML = `<div class="feed-item">No live feed available</div>`;
      return;
    }

    el("feed").innerHTML = feed.slice(0,8).map(item=>{
      const content = typeof item === "string"
        ? item
        : text(item.text || item.title || item.summary);

      return `<div class="feed-item">${content}</div>`;
    }).join("");
  }

  function saveDraftObject(type, textValue){
    const payload = {
      text_en: textValue,
      text_ar: textValue
    };

    if(window.IBSS_PUBLISHER?.queueSystemBrief && type === "brief"){
      return window.IBSS_PUBLISHER.queueSystemBrief(getSystem());
    }

    if(window.IBSS_PUBLISHER?.queueSignalPost && type === "signal"){
      const system = getSystem();
      const signal = system?.topSignal || system?.dominantSignal || asArray(system?.rankedSignals)[0];
      return window.IBSS_PUBLISHER.queueSignalPost(signal);
    }

    return null;
  }

  function renderLatestDraft(){
    const draft = window.IBSS_PUBLISHER?.getLatestDraft?.();

    if(!draft){
      el("draft").value = "";
      return;
    }

    el("draft").value =
      draft.payload?.text_en ||
      draft.payload?.text_ar ||
      draft.text_en ||
      draft.text_ar ||
      "";
  }

  function generateViralSignal(){
    const system = getSystem();

    try{
      if(window.IBSS_VIRAL?.generate){
        const draft = window.IBSS_VIRAL.generate(system,"en");

        if(typeof draft === "string"){
          el("draft").value = draft;
          return;
        }

        el("draft").value =
          draft?.text_en ||
          draft?.payload?.text_en ||
          JSON.stringify(draft,null,2);

        return;
      }
    }catch(e){
      console.error("IBSS viral engine error", e);
    }

    saveDraftObject("signal","");
    renderLatestDraft();
  }

  function generateBrief(){
    saveDraftObject("brief","");
    renderLatestDraft();
  }

  function renderAll(){
    const system = getSystem();

    if(!system){
      el("feed").innerHTML = `<div class="feed-item">System not ready</div>`;
      return;
    }

    renderState(system);
    renderSignal(system);
    renderFeed(system);
    renderLatestDraft();
  }

  el("genSignal").addEventListener("click", generateViralSignal);
  el("genBrief").addEventListener("click", generateBrief);

  window.addEventListener("load", function(){
    renderAll();

    if(window.IBSS_RUNTIME?.start){
      window.IBSS_RUNTIME.start({
        pageId:"dashboard",
        refreshMs:4000,
        systemProvider:getSystem,
        afterRender:renderAll
      });
    }else{
      setInterval(renderAll,4000);
    }
  });

})();
</script>

</body>
</html>
