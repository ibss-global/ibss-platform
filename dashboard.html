<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IBSS Dashboard</title>

  <style>
    :root{
      --gold:#d4af37;
      --bg:#040404;
      --panel:#0d0d0d;
      --panel2:#121212;
      --text:#ffffff;
      --muted:#9d9d9d;
      --red:#ff4d4f;
      --orange:#ff9f1a;
      --green:#00d084;
      --border:rgba(212,175,55,.28);
      --soft-border:rgba(255,255,255,.08);
      --soft-border-2:rgba(255,255,255,.06);
    }

    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      padding:0;
      background:
        radial-gradient(circle at top, rgba(212,175,55,.06), transparent 26%),
        var(--bg);
      color:var(--text);
      font-family:Arial, sans-serif;
    }

    body{
      min-height:100vh;
    }

    .wrap{
      width:min(1100px, 92%);
      margin:auto;
      padding:20px 0 36px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      padding:12px 0 22px;
      border-bottom:1px solid rgba(255,255,255,.05);
      flex-wrap:wrap;
    }

    .brand{
      color:var(--gold);
      font-size:30px;
      font-weight:900;
      text-decoration:none;
      letter-spacing:1px;
    }

    .nav{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .nav a{
      color:var(--muted);
      text-decoration:none;
      border:1px solid var(--soft-border);
      padding:10px 14px;
      border-radius:12px;
      font-size:14px;
      transition:.2s ease;
    }

    .nav a:hover,
    .nav a.active{
      color:var(--gold);
      border-color:var(--border);
      box-shadow:0 0 0 1px rgba(212,175,55,.08) inset;
    }

    .hero{
      text-align:center;
      padding:30px 0 18px;
    }

    .hero h1{
      margin:0 0 10px;
      font-size:42px;
      color:var(--gold);
      font-weight:900;
      letter-spacing:.5px;
    }

    .hero p{
      margin:0;
      color:var(--muted);
      font-size:16px;
      line-height:1.8;
    }

    .alert{
      display:none;
      margin:18px 0 0;
      text-align:center;
      padding:14px;
      border-radius:14px;
      background:rgba(255,77,79,.14);
      border:1px solid rgba(255,77,79,.40);
      color:#ffd1d1;
      font-weight:800;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
      margin-top:22px;
    }

    .card{
      background:var(--panel);
      border:1px solid var(--soft-border);
      border-radius:22px;
      padding:22px;
      box-shadow:0 10px 24px rgba(0,0,0,.18);
    }

    .title{
      color:var(--gold);
      font-size:24px;
      font-weight:900;
      margin-bottom:16px;
    }

    .state{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .state-item,
    .signal-box,
    .legend-item,
    .feed-item,
    .decision-box{
      background:var(--panel2);
      border:1px solid var(--soft-border-2);
      border-radius:16px;
    }

    .state-item{
      padding:14px;
      min-height:96px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .label{
      color:var(--muted);
      font-size:13px;
      margin-bottom:8px;
    }

    .value{
      font-size:24px;
      font-weight:900;
      letter-spacing:.3px;
    }

    .high{ color:var(--red); }
    .medium{ color:var(--orange); }
    .low{ color:var(--green); }

    .decision-box{
      margin-top:18px;
      text-align:center;
      padding:18px;
      border-color:rgba(212,175,55,.22);
      background:rgba(212,175,55,.05);
    }

    .decision{
      font-size:30px;
      font-weight:900;
      color:var(--gold);
      margin-bottom:8px;
    }

    .decision-note{
      color:var(--muted);
      line-height:1.8;
      min-height:50px;
      font-size:14px;
    }

    .signal-box{
      padding:16px;
      border-color:rgba(212,175,55,.24);
    }

    .signal-box h3{
      margin:0 0 10px;
      font-size:30px;
      color:#fff;
      line-height:1.25;
    }

    .signal-box p{
      margin:0;
      color:#ddd;
      line-height:1.8;
      font-size:14px;
    }

    .radar-wrap{
      display:flex;
      justify-content:center;
      align-items:center;
      padding:8px 0 4px;
    }

    .radar{
      position:relative;
      width:280px;
      height:280px;
      border-radius:50%;
    }

    .circle{
      position:absolute;
      border:1px solid rgba(212,175,55,.18);
      border-radius:50%;
    }

    .c1{ width:90px; height:90px; top:95px; left:95px; }
    .c2{ width:150px; height:150px; top:65px; left:65px; }
    .c3{ width:210px; height:210px; top:35px; left:35px; }
    .c4{ width:280px; height:280px; top:0; left:0; }

    .center-dot{
      position:absolute;
      width:16px;
      height:16px;
      border-radius:50%;
      background:var(--gold);
      top:132px;
      left:132px;
      box-shadow:0 0 18px rgba(212,175,55,.8);
      z-index:3;
    }

    .sweep{
      position:absolute;
      width:220px;
      height:220px;
      top:30px;
      left:30px;
      border-radius:50%;
      background:conic-gradient(rgba(212,175,55,.28), transparent 34%);
      animation:spin 4s linear infinite;
      opacity:.8;
    }

    .radar-signal{
      position:absolute;
      border-radius:50%;
      transform:translate(-50%, -50%);
      transition:.35s ease;
      z-index:4;
    }

    .radar-signal.high{
      background:var(--red);
      box-shadow:0 0 14px rgba(255,77,79,.75);
    }

    .radar-signal.medium{
      background:var(--orange);
      box-shadow:0 0 14px rgba(255,159,26,.75);
    }

    .radar-signal.low{
      background:var(--green);
      box-shadow:0 0 14px rgba(0,208,132,.75);
    }

    .legend{
      margin-top:16px;
      display:grid;
      gap:10px;
    }

    .legend-item{
      padding:12px 14px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
    }

    .legend-left{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .legend-dot{
      width:10px;
      height:10px;
      border-radius:50%;
      flex:0 0 auto;
    }

    .legend-dot.high{ background:var(--red); }
    .legend-dot.medium{ background:var(--orange); }
    .legend-dot.low{ background:var(--green); }

    .legend-name{
      color:#fff;
      font-size:14px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:320px;
    }

    .legend-meta{
      color:var(--muted);
      font-size:13px;
      white-space:nowrap;
    }

    .feed{
      display:grid;
      gap:10px;
    }

    .feed-item{
      padding:12px 14px;
      color:#ddd;
      line-height:1.7;
      font-size:14px;
    }

    .footer{
      margin-top:26px;
      text-align:center;
      color:#777;
      font-size:14px;
      border-top:1px solid rgba(255,255,255,.05);
      padding-top:22px;
    }

    @keyframes spin{
      from{ transform:rotate(0deg); }
      to{ transform:rotate(360deg); }
    }

    @media (max-width: 900px){
      .grid{ grid-template-columns:1fr; }
    }

    @media (max-width: 640px){
      .hero h1{ font-size:34px; }
      .state{ grid-template-columns:1fr 1fr; }
      .topbar{ flex-direction:column; }
      .nav{ justify-content:center; }
      .brand{ text-align:center; }
      .legend-item{
        flex-direction:column;
        align-items:flex-start;
      }
      .legend-meta{ white-space:normal; }
    }
  </style>
</head>
<body>
  <div class="wrap">

    <div class="topbar">
      <a class="brand" href="index.html">IBSS</a>

      <div class="nav">
        <a href="index.html">Home</a>
        <a href="dashboard.html" class="active">Dashboard</a>
        <a href="signals.html">Signals</a>
        <a href="reports.html">Reports</a>
        <a href="models.html">Models</a>
        <a href="about.html">About</a>
      </div>
    </div>

    <div class="hero">
      <h1>IBSS Dashboard</h1>
      <p>Decision Engine Visual System</p>
    </div>

    <div id="alertBox" class="alert"></div>

    <div class="grid">
      <div class="card">
        <div class="title">System State</div>

        <div class="state">
          <div class="state-item">
            <div class="label">Level</div>
            <div id="level" class="value medium">MEDIUM</div>
          </div>

          <div class="state-item">
            <div class="label">SSI</div>
            <div id="ssi" class="value medium">0</div>
          </div>

          <div class="state-item">
            <div class="label">Decision</div>
            <div id="decision" class="value">PRD</div>
          </div>

          <div class="state-item">
            <div class="label">Mode</div>
            <div id="mode" class="value">PREPARATION</div>
          </div>
        </div>

        <div class="decision-box">
          <div class="decision" id="decisionWord">PRD</div>
          <div class="decision-note" id="decisionNote">Awaiting live engine state.</div>
        </div>
      </div>

      <div class="card">
        <div class="title">Primary Signal</div>

        <div class="signal-box">
          <h3 id="signalTitle">-</h3>
          <p id="signalDesc">-</p>
        </div>

        <div class="title" style="margin-top:18px;">Radar</div>

        <div class="radar-wrap">
          <div class="radar" id="radar">
            <div class="circle c4"></div>
            <div class="circle c3"></div>
            <div class="circle c2"></div>
            <div class="circle c1"></div>
            <div class="sweep"></div>
            <div class="center-dot"></div>
          </div>
        </div>

        <div class="legend" id="radarLegend"></div>
      </div>
    </div>

    <div class="card" style="margin-top:18px;">
      <div class="title">Live Feed</div>
      <div id="feed" class="feed"></div>
    </div>

    <div class="footer">© 2026 IBSS — Dashboard Layer</div>
  </div>

  <script src="data.js"></script>
  <script src="engine.js"></script>
</body>
</html>
