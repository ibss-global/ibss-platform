<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IBSS Dashboard</title>

  <style>
    :root{
      --gold:#d4af37;
      --bg:#040404;
      --panel:#0d0d0d;
      --panel2:#121212;
      --text:#ffffff;
      --muted:#9d9d9d;
      --red:#ff4d4f;
      --orange:#ff9f1a;
      --green:#00d084;
      --blue:#5a8cff;
      --border:rgba(212,175,55,.28);
      --soft-border:rgba(255,255,255,.08);
      --soft-border-2:rgba(255,255,255,.06);
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      padding:0;
      font-family:Arial,sans-serif;
      background:
        radial-gradient(circle at top, rgba(212,175,55,.07), transparent 30%),
        var(--bg);
      color:var(--text);
    }

    body{
      min-height:100vh;
    }

    .wrap{
      width:min(1120px,92%);
      margin:auto;
      padding:20px 0 40px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      padding:14px 0 22px;
      border-bottom:1px solid rgba(255,255,255,.05);
      flex-wrap:wrap;
    }

    .brand{
      color:var(--gold);
      font-size:30px;
      font-weight:900;
      text-decoration:none;
      letter-spacing:1px;
    }

    .top-actions{
      display:flex;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .nav{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .nav a{
      color:var(--muted);
      text-decoration:none;
      border:1px solid var(--soft-border);
      padding:10px 14px;
      border-radius:12px;
      font-size:14px;
      transition:.2s ease;
    }

    .nav a:hover,
    .nav a.active{
      color:var(--gold);
      border-color:var(--border);
      box-shadow:0 0 0 1px rgba(212,175,55,.08) inset;
    }

    .lang-switch{
      display:flex;
      gap:6px;
    }

    .lang-switch button{
      background:none;
      border:1px solid rgba(255,255,255,.1);
      color:#ccc;
      padding:8px 10px;
      border-radius:10px;
      cursor:pointer;
      transition:.2s ease;
      font-size:13px;
    }

    .lang-switch button:hover,
    .lang-switch button.active{
      color:var(--gold);
      border-color:var(--gold);
    }

    .hero{
      text-align:center;
      padding:30px 0 18px;
    }

    .hero h1{
      margin:0 0 10px;
      font-size:42px;
      color:var(--gold);
      font-weight:900;
      letter-spacing:.5px;
    }

    .hero p{
      margin:0;
      color:var(--muted);
      font-size:16px;
      line-height:1.8;
    }

    .alert{
      display:none;
      margin:18px 0 0;
      text-align:center;
      padding:14px;
      border-radius:14px;
      background:rgba(255,77,79,.14);
      border:1px solid rgba(255,77,79,.40);
      color:#ffd1d1;
      font-weight:800;
      line-height:1.7;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
      margin-top:22px;
    }

    .card{
      background:var(--panel);
      border:1px solid var(--soft-border);
      border-radius:22px;
      padding:22px;
      box-shadow:0 10px 24px rgba(0,0,0,.18);
    }

    .title{
      color:var(--gold);
      font-size:24px;
      font-weight:900;
      margin-bottom:16px;
    }

    .state{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .state-item,
    .signal-box,
    .legend-item,
    .feed-item,
    .decision-box{
      background:var(--panel2);
      border:1px solid var(--soft-border-2);
      border-radius:16px;
    }

    .state-item{
      padding:14px;
      min-height:96px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .label{
      color:var(--muted);
      font-size:13px;
      margin-bottom:8px;
    }

    .value{
      font-size:24px;
      font-weight:900;
      letter-spacing:.3px;
      line-height:1.2;
    }

    .high{color:var(--red)}
    .medium{color:var(--orange)}
    .low{color:var(--green)}

    .decision-box{
      margin-top:18px;
      text-align:center;
      padding:18px;
      border-color:rgba(212,175,55,.22);
      background:rgba(212,175,55,.05);
    }

    .decision{
      font-size:32px;
      font-weight:900;
      color:var(--gold);
      margin-bottom:8px;
    }

    .decision-note{
      color:var(--muted);
      line-height:1.8;
      min-height:50px;
      font-size:14px;
    }

    .signal-box{
      padding:16px;
      border-color:rgba(212,175,55,.24);
    }

    .signal-box h3{
      margin:0 0 10px;
      font-size:34px;
      color:#fff;
      line-height:1.25;
    }

    .signal-box p{
      margin:0;
      color:#ddd;
      line-height:1.9;
      font-size:15px;
    }

    .radar-wrap{
      display:flex;
      justify-content:center;
      align-items:center;
      padding:14px 0 8px;
    }

    .radar{
      position:relative;
      width:300px;
      height:300px;
      border-radius:50%;
      filter:drop-shadow(0 0 20px rgba(212,175,55,.08));
    }

    .circle{
      position:absolute;
      border:1px solid rgba(212,175,55,.16);
      border-radius:50%;
    }

    .c1{width:90px;height:90px;top:105px;left:105px}
    .c2{width:150px;height:150px;top:75px;left:75px}
    .c3{width:220px;height:220px;top:40px;left:40px}
    .c4{width:300px;height:300px;top:0;left:0}

    .center-dot{
      position:absolute;
      width:18px;
      height:18px;
      border-radius:50%;
      background:var(--gold);
      top:141px;
      left:141px;
      box-shadow:0 0 20px rgba(212,175,55,.8);
      z-index:5;
    }

    .sweep{
      position:absolute;
      width:230px;
      height:230px;
      top:35px;
      left:35px;
      border-radius:50%;
      background:conic-gradient(rgba(212,175,55,.26), rgba(212,175,55,.05), transparent 42%);
      animation:spin 4s linear infinite;
      opacity:.9;
    }

    .radar-signal{
      position:absolute;
      border-radius:50%;
      transform:translate(-50%, -50%);
      transition:.35s ease;
      z-index:6;
    }

    .radar-signal.high{
      background:var(--red);
      box-shadow:0 0 16px rgba(255,77,79,.75);
    }

    .radar-signal.medium{
      background:var(--orange);
      box-shadow:0 0 16px rgba(255,159,26,.75);
    }

    .radar-signal.low{
      background:var(--green);
      box-shadow:0 0 16px rgba(0,208,132,.7);
    }

    .radar-signal.dominant{
      outline:3px solid rgba(212,175,55,.75);
      outline-offset:5px;
      box-shadow:
        0 0 0 6px rgba(212,175,55,.08),
        0 0 24px rgba(212,175,55,.28);
    }

    .legend{
      margin-top:18px;
      display:grid;
      gap:12px;
    }

    .legend-item{
      padding:14px 16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
    }

    .legend-left{
      display:flex;
      gap:12px;
      align-items:center;
      min-width:0;
    }

    .legend-dot{
      width:11px;
      height:11px;
      border-radius:50%;
      flex:0 0 auto;
    }

    .legend-dot.high{background:var(--red)}
    .legend-dot.medium{background:var(--orange)}
    .legend-dot.low{background:var(--green)}

    .legend-texts{
      min-width:0;
    }

    .legend-name{
      color:#fff;
      font-size:15px;
      font-weight:700;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:220px;
    }

    .legend-sub{
      color:var(--muted);
      font-size:12px;
      margin-top:4px;
    }

    .legend-right{
      text-align:right;
      flex:0 0 auto;
    }

    .legend-score{
      color:var(--gold);
      font-size:20px;
      font-weight:900;
      line-height:1;
    }

    .legend-badge{
      margin-top:6px;
      display:inline-block;
      padding:4px 8px;
      border-radius:999px;
      font-size:11px;
      font-weight:700;
      border:1px solid rgba(255,255,255,.08);
    }

    .legend-badge.high{
      color:#ffd7d7;
      background:rgba(255,77,79,.12);
      border-color:rgba(255,77,79,.3);
    }

    .legend-badge.medium{
      color:#ffe2b8;
      background:rgba(255,159,26,.12);
      border-color:rgba(255,159,26,.3);
    }

    .legend-badge.low{
      color:#d6fff1;
      background:rgba(0,208,132,.12);
      border-color:rgba(0,208,132,.28);
    }

    .feed{
      display:grid;
      gap:10px;
    }

    .feed-item{
      padding:13px 15px;
      color:#e3e3e3;
      line-height:1.7;
      font-size:14px;
    }

    .footer{
      margin-top:26px;
      text-align:center;
      color:#777;
      font-size:14px;
      border-top:1px solid rgba(255,255,255,.05);
      padding-top:22px;
    }

    @keyframes spin{
      from{transform:rotate(0deg)}
      to{transform:rotate(360deg)}
    }

    html[dir="rtl"] body{
      text-align:right;
    }

    html[dir="rtl"] .topbar,
    html[dir="rtl"] .top-actions,
    html[dir="rtl"] .nav,
    html[dir="rtl"] .legend-item{
      direction:rtl;
    }

    html[dir="rtl"] .hero,
    html[dir="rtl"] .decision-box,
    html[dir="rtl"] .footer,
    html[dir="rtl"] .alert{
      text-align:center;
    }

    html[dir="rtl"] .legend-right{
      text-align:left;
    }

    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
    }

    @media (max-width:640px){
      .hero h1{font-size:34px}
      .topbar{flex-direction:column}
      .nav{justify-content:center}
      .brand{text-align:center}

      .radar{
        width:270px;
        height:270px;
      }

      .c1{width:80px;height:80px;top:95px;left:95px}
      .c2{width:140px;height:140px;top:65px;left:65px}
      .c3{width:200px;height:200px;top:35px;left:35px}
      .c4{width:270px;height:270px}

      .center-dot{
        top:126px;
        left:126px;
      }

      .sweep{
        width:210px;
        height:210px;
        top:30px;
        left:30px;
      }

      .legend-item{
        align-items:flex-start;
        flex-direction:column;
      }

      .legend-right{
        text-align:left;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">

    <div class="topbar">
      <a class="brand" href="index.html">IBSS</a>

      <div class="top-actions">
        <div class="nav">
          <a href="index.html" data-i18n="nav_home">Home</a>
          <a href="dashboard.html" class="active" data-i18n="nav_dashboard">Dashboard</a>
          <a href="signals.html" data-i18n="nav_signals">Signals</a>
          <a href="reports.html" data-i18n="nav_reports">Reports</a>
          <a href="models.html" data-i18n="nav_models">Models</a>
          <a href="about.html" data-i18n="nav_about">About</a>
        </div>

        <div class="lang-switch">
          <button id="btn-en" type="button">EN</button>
          <button id="btn-ar" type="button">AR</button>
        </div>
      </div>
    </div>

    <div class="hero">
      <h1 id="pageTitle">IBSS Dashboard</h1>
      <p id="pageSub">Decision Engine Visual System</p>
    </div>

    <div id="alertBox" class="alert"></div>

    <div class="grid">
      <div class="card">
        <div class="title" id="stateTitle">System State</div>

        <div class="state">
          <div class="state-item">
            <div class="label" id="levelLabel">Level</div>
            <div id="level" class="value medium">-</div>
          </div>

          <div class="state-item">
            <div class="label" id="ssiLabel">SSI</div>
            <div id="ssi" class="value medium">0</div>
          </div>

          <div class="state-item">
            <div class="label" id="decisionLabel">Decision</div>
            <div id="decision" class="value">-</div>
          </div>

          <div class="state-item">
            <div class="label" id="modeLabel">Mode</div>
            <div id="mode" class="value">-</div>
          </div>
        </div>

        <div class="decision-box">
          <div class="decision" id="decisionWord">-</div>
          <div class="decision-note" id="decisionNote">-</div>
        </div>
      </div>

      <div class="card">
        <div class="title" id="signalTitleLabel">Primary Signal</div>

        <div class="signal-box">
          <h3 id="signalTitle">-</h3>
          <p id="signalDesc">-</p>
        </div>

        <div class="title" style="margin-top:18px" id="radarTitle">Radar</div>

        <div class="radar-wrap">
          <div class="radar" id="radar">
            <div class="circle c4"></div>
            <div class="circle c3"></div>
            <div class="circle c2"></div>
            <div class="circle c1"></div>
            <div class="sweep"></div>
            <div class="center-dot"></div>
          </div>
        </div>

        <div class="legend" id="radarLegend"></div>
      </div>
    </div>

    <div class="card" style="margin-top:18px">
      <div class="title" id="feedTitle">Live Feed</div>
      <div id="feed" class="feed"></div>
    </div>

    <div class="footer">© 2026 IBSS — Dashboard Layer</div>
  </div>

  <script src="data.js"></script>
  <script src="engine.js"></script>

  <script>
    const UI = {
      en: {
        nav_home: "Home",
        nav_dashboard: "Dashboard",
        nav_signals: "Signals",
        nav_reports: "Reports",
        nav_models: "Models",
        nav_about: "About",
        title: "IBSS Dashboard",
        sub: "Decision Engine Visual System",
        state: "System State",
        level: "Level",
        ssi: "SSI",
        decision: "Decision",
        mode: "Mode",
        signal: "Primary Signal",
        radar: "Radar",
        feed: "Live Feed",
        levelHigh: "HIGH",
        levelMed: "MEDIUM",
        levelLow: "LOW",
        decisionHigh: "ACT",
        decisionMed: "PRD",
        decisionLow: "WATCH",
        modeHigh: "ACTIVE RESPONSE",
        modeMed: "PREPARATION",
        modeLow: "MONITORING",
        noteHigh: "High pressure environment detected. Immediate response required.",
        noteMedium: "Structured pressure detected. Maintain preparation readiness.",
        noteLow: "Low pressure. Continue monitoring.",
        alertHigh: "⚠ HIGH ESCALATION — ACTIVE RESPONSE",
        alertMed: "⚠ STRUCTURED PRESSURE — PREPARATION MODE",
        alertLow: "✓ LOW PRESSURE — MONITORING STABLE",
        unknownType: "Unknown"
      },
      ar: {
        nav_home: "الرئيسية",
        nav_dashboard: "لوحة التحكم",
        nav_signals: "الإشارات",
        nav_reports: "التقارير",
        nav_models: "النماذج",
        nav_about: "حول",
        title: "لوحة تحكم IBSS",
        sub: "النظام البصري لمحرك القرار",
        state: "حالة النظام",
        level: "المستوى",
        ssi: "مؤشر SSI",
        decision: "القرار",
        mode: "الوضع",
        signal: "الإشارة الأساسية",
        radar: "الرادار",
        feed: "التغذية الحية",
        levelHigh: "مرتفع",
        levelMed: "متوسط",
        levelLow: "منخفض",
        decisionHigh: "تحرك",
        decisionMed: "استعداد",
        decisionLow: "مراقبة",
        modeHigh: "استجابة نشطة",
        modeMed: "تحضير",
        modeLow: "مراقبة",
        noteHigh: "تم رصد بيئة ضغط مرتفعة. الاستجابة الفورية مطلوبة.",
        noteMedium: "تم رصد ضغط بنيوي. حافظ على الجاهزية.",
        noteLow: "الضغط منخفض. استمر في المراقبة.",
        alertHigh: "⚠ تم رصد تصعيد مرتفع — استجابة نشطة",
        alertMed: "⚠ تم رصد ضغط بنيوي — وضعية تحضير",
        alertLow: "✓ ضغط منخفض — مراقبة مستقرة",
        unknownType: "غير معروف"
      }
    };

    let currentLang = localStorage.getItem("ibss_lang") || "en";

    function t(key){
      return UI[currentLang]?.[key] || key;
    }

    function safe(val, fallback = "-"){
      return val !== undefined && val !== null && val !== "" ? val : fallback;
    }

    function escapeHtml(text){
      return String(safe(text, "")).replace(/[&<>"']/g, function(char){
        const map = {
          "&":"&amp;",
          "<":"&lt;",
          ">":"&gt;",
          '"':"&quot;",
          "'":"&#39;"
        };
        return map[char];
      });
    }

    function priorityClass(priority){
      if (priority === "HIGH") return "high";
      if (priority === "MEDIUM") return "medium";
      return "low";
    }

    function getSignalsArray(){
      return Array.isArray(window.IBSS_SIGNALS) ? window.IBSS_SIGNALS : [];
    }

    function getLocalScore(signal){
      const metrics = signal?.metrics || {};
      const weight = Number(metrics.weight || 0);
      const volatility = Number(metrics.volatility || 0);
      const impact = Number(metrics.impact || 0);
      return (weight * 0.5) + (volatility * 0.3) + (impact * 0.2);
    }

    function getPriority(signal){
      return safe(signal?.priority, safe(signal?.reportMeta?.priority, safe(signal?.weight, "LOW")));
    }

    function getSignalTitle(signal){
      return safe(signal?.title?.[currentLang], safe(signal?.title?.en, safe(signal?.title, "-")));
    }

    function getSignalDesc(signal){
      return safe(
        signal?.description?.[currentLang],
        safe(signal?.description?.en, safe(signal?.description, "-"))
      );
    }

    function getSignalType(signal){
      return safe(
        signal?.signalType?.[currentLang],
        safe(signal?.signalType?.en, safe(signal?.signalType, t("unknownType")))
      );
    }

    function getSignalDecisionMode(signal){
      return safe(
        signal?.decisionMode?.[currentLang],
        safe(signal?.decisionMode?.en, safe(signal?.decisionMode, "-"))
      );
    }

    function applyLanguage(){
      document.documentElement.lang = currentLang;
      document.documentElement.dir = currentLang === "ar" ? "rtl" : "ltr";

      document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.getAttribute("data-i18n");
        el.textContent = t(key);
      });

      document.getElementById("pageTitle").textContent = t("title");
      document.getElementById("pageSub").textContent = t("sub");
      document.getElementById("stateTitle").textContent = t("state");
      document.getElementById("levelLabel").textContent = t("level");
      document.getElementById("ssiLabel").textContent = t("ssi");
      document.getElementById("decisionLabel").textContent = t("decision");
      document.getElementById("modeLabel").textContent = t("mode");
      document.getElementById("signalTitleLabel").textContent = t("signal");
      document.getElementById("radarTitle").textContent = t("radar");
      document.getElementById("feedTitle").textContent = t("feed");

      document.getElementById("btn-en").classList.toggle("active", currentLang === "en");
      document.getElementById("btn-ar").classList.toggle("active", currentLang === "ar");
    }

    function normalizeRankedSignals(signals){
      return (signals || []).map(signal => {
        const localScore100 = Math.round(getLocalScore(signal) * 100);
        return {
          ...signal,
          balancedScore100: Number(
            signal?.balancedScore100 ??
            signal?.score100 ??
            Math.round((signal?.score || 0) * 100) ??
            localScore100
          )
        };
      });
    }

    function buildLocalSystem(){
      const rankedSignals = normalizeRankedSignals(
        [...getSignalsArray()].sort((a, b) => getLocalScore(b) - getLocalScore(a))
      );

      const topSignal = rankedSignals[0] || null;

      const total = rankedSignals.reduce((sum, signal) => sum + (signal.balancedScore100 || 0), 0);
      const systemPressure = rankedSignals.length ? Math.round(total / rankedSignals.length) : 0;

      return {
        systemPressure,
        rankedSignals,
        topSignal
      };
    }

    function adaptEngineState(raw){
      if (!raw || typeof raw !== "object") return null;

      const rankedSignals = normalizeRankedSignals(
        raw.rankedSignals ||
        raw.liveSignals ||
        raw.signals ||
        []
      );

      const topSignal =
        raw.topSignal ||
        raw.dominantSignal ||
        rankedSignals[0] ||
        null;


    function getSystem(){
      try {
        if (window.IBSS_ENGINE) {
          if (typeof window.IBSS_ENGINE.getCurrentState === "function") {
            const state = adaptEngineState(window.IBSS_ENGINE.getCurrentState());
            if (state) return state;
          }

          if (typeof window.IBSS_ENGINE.computeSystemState === "function") {
            const state = adaptEngineState(window.IBSS_ENGINE.computeSystemState());
            if (state) return state;
          }

          if (typeof window.IBSS_ENGINE.tick === "function") {
            const state = adaptEngineState(window.IBSS_ENGINE.tick());
            if (state) return state;
          }

          if (typeof window.IBSS_ENGINE.getStaticSystemFallback === "function") {
            const state = adaptEngineState(window.IBSS_ENGINE.getStaticSystemFallback());
            if (state) return state;
          }

          if (typeof window.IBSS_ENGINE.readSavedSystem === "function") {
            const saved = adaptEngineState(window.IBSS_ENGINE.readSavedSystem());
            if (saved) return saved;
          }
        }
      } catch (error) {
        console.error("IBSS engine read error:", error);
      }

      return buildLocalSystem();
    }

    function setLevelUI(systemPressure){
      const levelEl = document.getElementById("level");
      const ssiEl = document.getElementById("ssi");
      const alertBox = document.getElementById("alertBox");

      const pressure = Number(systemPressure) || 0;
      let level = "LOW";

      if (pressure >= 75) level = "HIGH";
      else if (pressure >= 50) level = "MEDIUM";

      if (level === "HIGH") {
        levelEl.textContent = t("levelHigh");
        levelEl.className = "value high";
        ssiEl.className = "value high";
        alertBox.style.display = "block";
        alertBox.textContent = t("alertHigh");
      } else if (level === "MEDIUM") {
        levelEl.textContent = t("levelMed");
        levelEl.className = "value medium";
        ssiEl.className = "value medium";
        alertBox.style.display = "block";
        alertBox.textContent = t("alertMed");
      } else {
        levelEl.textContent = t("levelLow");
        levelEl.className = "value low";
        ssiEl.className = "value low";
        alertBox.style.display = "block";
        alertBox.textContent = t("alertLow");
      }

      ssiEl.textContent = pressure;
      return level;
    }

    function setDecisionUI(level){
      const decisionEl = document.getElementById("decision");
      const decisionWord = document.getElementById("decisionWord");
      const decisionNote = document.getElementById("decisionNote");
      const modeEl = document.getElementById("mode");

      if (level === "HIGH") {
        decisionEl.textContent = t("decisionHigh");
        decisionWord.textContent = t("decisionHigh");
        decisionNote.textContent = t("noteHigh");
        modeEl.textContent = t("modeHigh");
      } else if (level === "MEDIUM") {
        decisionEl.textContent = t("decisionMed");
        decisionWord.textContent = t("decisionMed");
        decisionNote.textContent = t("noteMedium");
        modeEl.textContent = t("modeMed");
      } else {
        decisionEl.textContent = t("decisionLow");
        decisionWord.textContent = t("decisionLow");
        decisionNote.textContent = t("noteLow");
        modeEl.textContent = t("modeLow");
      }
    }

    function setPrimarySignalUI(signal){
      const titleEl = document.getElementById("signalTitle");
      const descEl = document.getElementById("signalDesc");

      if (!signal) {
        titleEl.textContent = "-";
        descEl.textContent = "-";
        return;
      }

      titleEl.textContent = getSignalTitle(signal);
      descEl.textContent = getSignalDesc(signal);
    }

    function renderRadar(system){
      const radar = document.getElementById("radar");
      const legend = document.getElementById("radarLegend");

      if (!radar || !legend) return;

      radar.querySelectorAll(".radar-signal").forEach(el => el.remove());

      const signals = (system.rankedSignals || []).slice(0, 5);

      const positions = [
        { x: 50, y: 18 },
        { x: 78, y: 38 },
        { x: 68, y: 72 },
        { x: 28, y: 68 },
        { x: 18, y: 45 }
      ];

      signals.forEach((signal, index) => {
        const dot = document.createElement("div");
        const pos = positions[index] || { x: 50, y: 50 };
        const score = Number(signal.balancedScore100 || 0);
        const size = Math.max(10, Math.min(26, Math.round(score / 5)));
        const priority = getPriority(signal);

        dot.className = "radar-signal " + priorityClass(priority) + (index === 0 ? " dominant" : "");
        dot.style.width = size + "px";
        dot.style.height = size + "px";
        dot.style.left = pos.x + "%";
        dot.style.top = pos.y + "%";

        radar.appendChild(dot);
      });

      legend.innerHTML = signals.map(signal => {
        const score = Number(signal.balancedScore100 || 0);
        const priority = getPriority(signal);

        return `
          <div class="legend-item">
            <div class="legend-left">
              <span class="legend-dot ${priorityClass(priority)}"></span>
              <div class="legend-texts">
                <div class="legend-name">${escapeHtml(getSignalTitle(signal))}</div>
                <div class="legend-sub">${escapeHtml(getSignalType(signal))}</div>
              </div>
            </div>
            <div class="legend-right">
              <div class="legend-score">${score}</div>
              <span class="legend-badge ${priorityClass(priority)}">${escapeHtml(priority)}</span>
            </div>
          </div>
        `;
      }).join("");
    }

    function setFeed(system){
      const feed = document.getElementById("feed");
      if (!feed) return;

      const ranked = system.rankedSignals || [];
      const top = ranked[0] || null;

      const lines = [
        "• Pressure index updated to " + safe(system.systemPressure, 0),
        "• UI layer synchronized with ranked signal set",
        "• Primary signal currently driving dashboard posture",
        top
          ? `• Top file: ${safe(getSignalTitle(top))} — ${safe(getSignalDecisionMode(top))}`
          : "• No dominant signal detected"
      ];

      ranked.slice(1, 5).forEach(signal => {
        lines.push(`• ${safe(getSignalTitle(signal))} — ${safe(getSignalDecisionMode(signal))}`);
      });

      feed.innerHTML = lines.map(line => `<div class="feed-item">${escapeHtml(line)}</div>`).join("");
    }

    function renderDashboard(){
      applyLanguage();

      const system = getSystem();
      const level = setLevelUI(system.systemPressure);
      setDecisionUI(level);
      setPrimarySignalUI(system.topSignal);
      renderRadar(system);
      setFeed(system);
    }

    document.getElementById("btn-en").addEventListener("click", function(){
      currentLang = "en";
      localStorage.setItem("ibss_lang", "en");
      renderDashboard();
    });

    document.getElementById("btn-ar").addEventListener("click", function(){
      currentLang = "ar";
      localStorage.setItem("ibss_lang", "ar");
      renderDashboard();
    });

    window.addEventListener("load", function(){
      renderDashboard();
      setInterval(renderDashboard, 3000);
    });
  </script>
</body>
</html>
