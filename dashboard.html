<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IBSS Dashboard</title>

<style>
body {
  background: black;
  color: #ddd;
  font-family: Arial;
  text-align: center;
  padding: 20px;
}

h1 {
  color: #d4af37;
}

.box {
  border: 1px solid #d4af37;
  padding: 15px;
  margin: 20px auto;
  width: 90%;
  max-width: 400px;
  border-radius: 10px;
}

.title {
  color: #d4af37;
  margin-bottom: 10px;
}

.signal {
  margin: 5px 0;
}

.status {
  color: #00ffcc;
}

.warning {
  color: orange;
}

</style>
</head>

<body>

<h1>IBSS — Control Dashboard</h1>
<p class="status">System Active — Monitoring Global Signals</p>

<div class="box">
  <div class="title">System State</div>
  <p>Escalation Level: <span class="warning">HIGH</span></p>
  <p>WAAD Status: ACTIVE</p>
  <p>System Mode: MONITORING</p>
</div>

<div class="box">
  <div class="title">Active Signals</div>
  <div class="signal">Iran Negotiations</div>
  <div class="signal">Lebanon Pressure</div>
  <div class="signal">Gaza Structure</div>
</div>

<div class="box">
  <div class="title">Scenarios</div>
  <p>A — 40%</p>
  <p>B — 35%</p>
  <p>C — 25%</p>
</div>

<div class="box">
  <div class="title">Decision Output</div>
  <p>WATCH / PRD</p>
</div>

</body>
</html>
