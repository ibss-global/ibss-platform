<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IBSS Dashboard</title>

<style>
:root{
  --gold:#d4af37;
  --bg:#040404;
  --panel:#0d0d0d;
  --panel2:#121212;
  --text:#fff;
  --muted:#9d9d9d;
  --red:#ff4d4f;
  --orange:#ff9f1a;
  --green:#00d084;
  --border:rgba(212,175,55,.28);
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:
    radial-gradient(circle at top, rgba(212,175,55,.08), transparent 35%),
    var(--bg);
  color:var(--text);
}

.wrap{
  width:92%;
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  padding:14px 0 20px;
  border-bottom:1px solid rgba(255,255,255,.05);
  flex-wrap:wrap;
}

.brand{
  color:var(--gold);
  font-size:28px;
  font-weight:800;
  text-decoration:none;
  letter-spacing:1px;
}

.nav{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.nav a{
  color:var(--muted);
  text-decoration:none;
  border:1px solid rgba(255,255,255,.08);
  padding:10px 14px;
  border-radius:10px;
  font-size:14px;
  transition:.2s ease;
}

.nav a.active,
.nav a:hover{
  color:var(--gold);
  border-color:var(--border);
}

.lang-switch{
  display:flex;
  gap:6px;
}

.lang-switch button{
  background:none;
  border:1px solid rgba(255,255,255,.1);
  color:#ccc;
  padding:8px 10px;
  border-radius:8px;
  cursor:pointer;
  transition:.2s ease;
  font-size:13px;
}

.lang-switch button:hover,
.lang-switch button.active{
  color:var(--gold);
  border-color:var(--gold);
}

.top-actions{
  display:flex;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
  justify-content:center;
}

.hero{
  text-align:center;
  padding:28px 0 18px;
}

.hero h1{
  color:var(--gold);
  margin:0 0 8px;
  font-size:42px;
}

.hero p{
  color:var(--muted);
  margin:0;
}

.alert{
  display:none;
  background:rgba(255,77,79,.14);
  border:1px solid rgba(255,77,79,.4);
  color:#ffd1d1;
  padding:14px;
  border-radius:12px;
  margin:16px 0;
  text-align:center;
  font-weight:700;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
  margin-top:20px;
}

.card{
  background:var(--panel);
  padding:20px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.08);
}

.title{
  color:var(--gold);
  font-size:24px;
  font-weight:800;
  margin-bottom:16px;
}

.state{
  display:grid;
  gap:12px;
}

.state-item,
.feed-item,
.signal-box{
  background:var(--panel2);
  border:1px solid rgba(255,255,255,.06);
  border-radius:14px;
  padding:14px;
}

.label{
  color:var(--muted);
  font-size:13px;
  margin-bottom:6px;
}

.value{
  font-size:22px;
  font-weight:800;
}

.high{color:var(--red)}
.medium{color:var(--orange)}
.low{color:var(--green)}

.decision-box{
  margin-top:18px;
  text-align:center;
  background:rgba(212,175,55,.05);
  border:1px solid rgba(212,175,55,.22);
  border-radius:16px;
  padding:18px;
}

.decision{
  font-size:30px;
  font-weight:900;
  color:var(--gold);
  margin-bottom:8px;
}

.decision-note{
  color:var(--muted);
  line-height:1.7;
  min-height:48px;
}

.signal-box{
  border-color:rgba(212,175,55,.3);
}

.signal-box h3{
  margin:0 0 10px;
  font-size:30px;
  color:#fff;
}

.signal-box p{
  margin:0;
  color:#ddd;
  line-height:1.8;
}

.radar-wrap{
  display:flex;
  justify-content:center;
  align-items:center;
  padding:10px 0 4px;
}

.radar{
  position:relative;
  width:280px;
  height:280px;
  border-radius:50%;
}

.circle{
  position:absolute;
  border:1px solid rgba(212,175,55,.18);
  border-radius:50%;
}

.c1{width:90px;height:90px;top:95px;left:95px;}
.c2{width:150px;height:150px;top:65px;left:65px;}
.c3{width:210px;height:210px;top:35px;left:35px;}
.c4{width:280px;height:280px;top:0;left:0;}

.center-dot{
  position:absolute;
  width:16px;
  height:16px;
  border-radius:50%;
  background:var(--gold);
  top:132px;
  left:132px;
  box-shadow:0 0 18px rgba(212,175,55,.8);
  z-index:3;
}

.sweep{
  position:absolute;
  width:220px;
  height:220px;
  top:30px;
  left:30px;
  border-radius:50%;
  background:conic-gradient(rgba(212,175,55,.28), rgba(212,175,55,.04), transparent 45%);
  animation:spin 4s linear infinite;
  opacity:.8;
}

.radar-signal{
  position:absolute;
  border-radius:50%;
  transform:translate(-50%, -50%);
  transition:.35s ease;
  z-index:4;
}

.radar-signal.high{
  background:var(--red);
  box-shadow:0 0 14px rgba(255,77,79,.75);
}

.radar-signal.medium{
  background:var(--orange);
  box-shadow:0 0 14px rgba(255,159,26,.75);
}

.radar-signal.low{
  background:var(--green);
  box-shadow:0 0 14px rgba(0,208,132,.75);
}

.radar-signal.dominant{
  outline:2px solid rgba(212,175,55,.7);
  outline-offset:4px;
}

.legend{
  margin-top:16px;
  display:grid;
  gap:10px;
}

.legend-item{
  display:flex;
  justify-content:space-between;
  gap:12px;
  background:var(--panel2);
  border:1px solid rgba(255,255,255,.06);
  border-radius:12px;
  padding:12px 14px;
  font-size:14px;
}

.legend-left{
  display:flex;
  gap:10px;
  align-items:center;
  min-width:0;
}

.legend-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  flex:0 0 auto;
}

.legend-name{
  color:#fff;
}

.legend-meta{
  color:var(--muted);
  white-space:nowrap;
}

.feed{
  display:grid;
  gap:10px;
}

.footer{
  margin-top:26px;
  text-align:center;
  color:#777;
  font-size:14px;
  border-top:1px solid rgba(255,255,255,.05);
  padding-top:20px;
}

@keyframes spin{
  from{transform:rotate(0deg)}
  to{transform:rotate(360deg)}
}

html[dir="rtl"] body{
  text-align:right;
}

html[dir="rtl"] .topbar,
html[dir="rtl"] .top-actions,
html[dir="rtl"] .nav,
html[dir="rtl"] .legend-item{
  direction:rtl;
}

html[dir="rtl"] .hero,
html[dir="rtl"] .footer,
html[dir="rtl"] .alert,
html[dir="rtl"] .decision-box{
  text-align:center;
}

@media(max-width:900px){
  .grid{grid-template-columns:1fr}
}

@media(max-width:700px){
  .topbar{flex-direction:column}
}
</style>
</head>
<body>

<div class="wrap">

  <div class="topbar">
    <a class="brand" href="index.html">IBSS</a>

    <div class="top-actions">
      <div class="nav">
        <a href="index.html">Home</a>
        <a href="dashboard.html" class="active">Dashboard</a>
        <a href="signals.html">Signals</a>
        <a href="reports.html">Reports</a>
      </div>

      <div class="lang-switch">
        <button id="btn-en" onclick="setLang('en')">EN</button>
        <button id="btn-ar" onclick="setLang('ar')">AR</button>
      </div>
    </div>
  </div>

  <div class="hero">
    <h1 id="pageTitle">IBSS Dashboard</h1>
    <p id="pageSub">Decision Engine Visual System</p>
  </div>

  <div id="alertBox" class="alert"></div>

  <div class="grid">
    <div class="card">
      <div class="title" id="stateTitle">System State</div>

      <div class="state">
        <div class="state-item">
          <div class="label" id="levelLabel">Level</div>
          <div id="level" class="value medium">MEDIUM</div>
        </div>

        <div class="state-item">
          <div class="label" id="ssiLabel">SSI</div>
          <div id="ssi" class="value medium">71</div>
        </div>

        <div class="state-item">
          <div class="label" id="decisionLabel">Decision</div>
          <div id="decision" class="value">PRD</div>
        </div>

        <div class="state-item">
          <div class="label" id="modeLabel">Mode</div>
          <div id="mode" class="value">PREPARATION</div>
        </div>
      </div>

      <div class="decision-box">
        <div class="decision" id="decisionWord">PRD</div>
        <div class="decision-note" id="decisionNote"></div>
      </div>
    </div>

    <div class="card">
      <div class="title" id="signalTitleLabel">Primary Signal</div>

      <div class="signal-box">
        <h3 id="signalTitle">Gaza Structure</h3>
        <p id="signalDesc">-</p>
      </div>

      <div class="title" style="margin-top:18px" id="radarTitle">Radar</div>
      <div class="radar-wrap">
        <div class="radar" id="radar">
          <div class="circle c4"></div>
          <div class="circle c3"></div>
          <div class="circle c2"></div>
          <div class="circle c1"></div>
          <div class="sweep"></div>
          <div class="center-dot"></div>
        </div>
      </div>

      <div class="legend" id="radarLegend"></div>
    </div>
  </div>

  <div class="card" style="margin-top:18px">
    <div class="title" id="feedTitle">Live Feed</div>
    <div id="feed" class="feed"></div>
  </div>

  <div class="footer">© 2026 IBSS — Dashboard Layer</div>

</div>

<script src="data.js"></script>
<script src="engine.js"></script>
<script>
const ui = {
  en: {
    title: "IBSS Dashboard",
    sub: "Decision Engine Visual System",
    state: "System State",
    level: "Level",
    ssi: "SSI",
    decision: "Decision",
    mode: "Mode",
    signal: "Primary Signal",
    radar: "Radar",
    feed: "Live Feed",
    highAlert: "⚠ HIGH ESCALATION — ACTIVE RESPONSE",
    medAlert: "⚠ STRUCTURED PRESSURE — PREPARATION MODE",
    noteHigh: "High pressure environment detected. Immediate readiness required.",
    noteMedium: "Structured pressure remains present. Maintain preparation posture.",
    noteLow: "Low pressure. Continue monitoring.",
    modeHigh: "ACTIVE RESPONSE",
    modeMed: "PREPARATION",
    modeLow: "MONITORING",
    levelHigh: "HIGH",
    levelMed: "MEDIUM",
    levelLow: "LOW",
    decisionHigh: "ACT",
    decisionMed: "PRD",
    decisionLow: "WATCH",
    feedUpdate: "Pressure index updated to",
    feedDriven: "Decision driven by engine",
    feedMemory: "Escalation memory active",
    feedLock: "Decision lock engaged"
  },
  ar: {
    title: "لوحة تحكم IBSS",
    sub: "النظام البصري لمحرك القرار",
    state: "حالة النظام",
    level: "المستوى",
    ssi: "مؤشر SSI",
    decision: "القرار",
    mode: "الوضع",
    signal: "الإشارة ذات الأولوية",
    radar: "الرادار",
    feed: "التغذية الحية",
    highAlert: "⚠ تم رصد تصعيد مرتفع — استجابة نشطة",
    medAlert: "⚠ تم رصد ضغط بنيوي — وضعية تحضير",
    noteHigh: "تم رصد بيئة ضغط مرتفعة. الجاهزية الفورية مطلوبة.",
    noteMedium: "الضغط البنيوي حاضر. حافظ على وضعية التحضير.",
    noteLow: "الضغط منخفض. واصل المراقبة.",
    modeHigh: "استجابة نشطة",
    modeMed: "تحضير",
    modeLow: "مراقبة",
    levelHigh: "مرتفع",
    levelMed: "متوسط",
    levelLow: "منخفض",
    decisionHigh: "تحرك",
    decisionMed: "استعداد",
    decisionLow: "مراقبة",
    feedUpdate: "تم تحديث المؤشر إلى",
    feedDriven: "القرار مبني على المحرك",
    feedMemory: "ذاكرة التصعيد مفعّلة",
    feedLock: "قفل القرار مفعّل"
  }
};

let currentLang = localStorage.getItem("ibss_lang") || "en";

function txt(key){
  return ui[currentLang][key] || key;
}

function safeText(value, fallback = "-"){
  return typeof value === "string" && value.trim() ? value : fallback;
}

function setLang(lang){
  currentLang = lang;
  localStorage.setItem("ibss_lang", lang);
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";
  document.getElementById("btn-en").classList.toggle("active", lang === "en");
  document.getElementById("btn-ar").classList.toggle("active", lang === "ar");
  applyStaticText();
  renderFromEngine();
}

function applyStaticText(){
  document.getElementById("pageTitle").textContent = txt("title");
  document.getElementById("pageSub").textContent = txt("sub");
  document.getElementById("stateTitle").textContent = txt("state");
  document.getElementById("levelLabel").textContent = txt("level");
  document.getElementById("ssiLabel").textContent = txt("ssi");
  document.getElementById("decisionLabel").textContent = txt("decision");
  document.getElementById("modeLabel").textContent = txt("mode");
  document.getElementById("signalTitleLabel").textContent = txt("signal");
  document.getElementById("radarTitle").textContent = txt("radar");
  document.getElementById("feedTitle").textContent = txt("feed");
}

function setLevel(level, ssi){
  const levelEl = document.getElementById("level");
  const ssiEl = document.getElementById("ssi");
  const alertBox = document.getElementById("alertBox");

  ssiEl.textContent = Number.isFinite(ssi) ? ssi : 0;

  if(level === "HIGH"){
    levelEl.textContent = txt("levelHigh");
    levelEl.className = "value high";
    ssiEl.className = "value high";
    alertBox.style.display = "block";
    alertBox.textContent = txt("highAlert");
  } else if(level === "MEDIUM"){
    levelEl.textContent = txt("levelMed");
    levelEl.className = "value medium";
    ssiEl.className = "value medium";
    alertBox.style.display = "block";
    alertBox.textContent = txt("medAlert");
  } else {
    levelEl.textContent = txt("levelLow");
    levelEl.className = "value low";
    ssiEl.className = "value low";
    alertBox.style.display = "none";
  }
}

function setDecision(system){
  const decisionEl = document.getElementById("decision");
  const decisionWord = document.getElementById("decisionWord");
  const decisionNote = document.getElementById("decisionNote");
  const modeEl = document.getElementById("mode");

  if(system.level === "HIGH"){
    decisionEl.textContent = txt("decisionHigh");
    decisionWord.textContent = txt("decisionHigh");
    decisionNote.textContent = txt("noteHigh");
    modeEl.textContent = txt("modeHigh");
  } else if(system.level === "MEDIUM"){
    decisionEl.textContent = txt("decisionMed");
    decisionWord.textContent = txt("decisionMed");
    decisionNote.textContent = txt("noteMedium");
    modeEl.textContent = txt("modeMed");
  } else {
    decisionEl.textContent = txt("decisionLow");
    decisionWord.textContent = txt("decisionLow");
    decisionNote.textContent = txt("noteLow");
    modeEl.textContent = txt("modeLow");
  }
}

function setPrimarySignal(signal){
  if(!signal){
    document.getElementById("signalTitle").textContent = "-";
    document.getElementById("signalDesc").textContent = "-";
    return;
  }

  document.getElementById("signalTitle").textContent =
    safeText(signal.title?.[currentLang] || signal.title?.en);
  document.getElementById("signalDesc").textContent =
    safeText(signal.description?.[currentLang] || signal.description?.en);
}

function priorityClass(priority){
  if(priority === "HIGH") return "high";
  if(priority === "MEDIUM") return "medium";
  return "low";
}

function renderRadar(system){
  const radar = document.getElementById("radar");
  radar.querySelectorAll(".radar-signal").forEach(el => el.remove());

  const ranked = Array.isArray(system.rankedSignals) ? system.rankedSignals.slice(0, 5) : [];
  const dominantId = system.dominantSignal ? system.dominantSignal.id : null;

  ranked.forEach(signal => {
    if (!signal?.metrics) return;

    const dot = document.createElement("div");
    const size = signal.weight === "HIGH" ? 16 : signal.weight === "MEDIUM" ? 12 : 10;
    const x = 20 + ((signal.metrics.volatility || 0) * 240);
    const y = 20 + ((signal.metrics.impact || 0) * 240);

    dot.className = `radar-signal ${priorityClass(signal.weight)}${signal.id === dominantId ? " dominant" : ""}`;
    dot.style.width = size + "px";
    dot.style.height = size + "px";
    dot.style.left = x + "px";
    dot.style.top = y + "px";

    radar.appendChild(dot);
  });

  const legend = document.getElementById("radarLegend");
  legend.innerHTML = ranked.map(signal => `
    <div class="legend-item">
      <div class="legend-left">
        <span class="legend-dot ${priorityClass(signal.weight)}"></span>
        <span class="legend-name">${safeText(signal.title?.[currentLang] || signal.title?.en)}</span>
      </div>
      <div class="legend-meta">
        ${safeText(signal.signalType?.[currentLang] || signal.signalType?.en)}
      </div>
    </div>
  `).join("");
}

function setFeed(system){
  const feed = document.getElementById("feed");
  const rankedSignals = Array.isArray(system.rankedSignals) ? system.rankedSignals.slice(0, 4) : [];

  const lines = [
    `• ${txt("feedUpdate")} ${Number.isFinite(system.ssi) ? system.ssi : 0}`,
    `• ${txt("feedDriven")}`,
    `• ${txt("feedMemory")}`,
    `• ${txt("feedLock")}`
  ];

  rankedSignals.forEach(signal => {
    const title = safeText(signal.title?.[currentLang] || signal.title?.en);
    const mode = safeText(signal.decisionMode?.[currentLang] || signal.decisionMode?.en);
    lines.push(`• ${title} — ${mode}`);
  });

  feed.innerHTML = lines.map(line => `<div class="feed-item">${line}</div>`).join("");
}

function renderFromEngine(){
  if (!window.IBSS_ENGINE || typeof IBSS_ENGINE.tick !== "function") {
    console.error("IBSS_ENGINE not loaded correctly");
    return;
  }

  const system = IBSS_ENGINE.tick();

  if (!system || typeof system !== "object") {
    console.error("Invalid system state from engine");
    return;
  }

  setLevel(system.level, system.ssi);
  setDecision(system);
  setPrimarySignal(system.dominantSignal);
  renderRadar(system);
  setFeed(system);
}

setLang(currentLang);
setInterval(renderFromEngine, IBSS_ENGINE?.CONFIG?.tickIntervalMs || 3000);
</script>

</body>
    </html>
