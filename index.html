<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IBSS — International Bureau of Sovereign Studies</title>

<style>
:root{
  --bg:#040404;
  --panel:#0d0d0d;
  --gold:#d4af37;
  --text:#e8e8e8;
  --muted:#9d9d9d;
  --green:#00d084;
  --orange:#ff9f1a;
  --red:#ff4d4f;
  --border:rgba(212,175,55,.28);
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:
    radial-gradient(circle at top, rgba(212,175,55,.08), transparent 40%),
    var(--bg);
  color:var(--text);
}

.wrap{
  width:min(1100px,92%);
  margin:auto;
  padding:20px 0 60px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
}

.brand{
  color:var(--gold);
  font-size:30px;
  font-weight:800;
  text-decoration:none;
}

.nav{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.nav a{
  color:var(--muted);
  text-decoration:none;
  padding:10px 14px;
  border:1px solid rgba(255,255,255,.08);
  border-radius:10px;
}

.nav a.active,
.nav a:hover{
  color:var(--gold);
  border-color:var(--border);
}

.lang-switch button{
  margin-left:5px;
  padding:6px 10px;
  background:none;
  border:1px solid #444;
  color:#ccc;
  border-radius:6px;
  cursor:pointer;
}

.lang-switch button.active{
  color:var(--gold);
  border-color:var(--gold);
}

.hero{
  text-align:center;
  padding:60px 0;
}

.hero h1{
  font-size:50px;
}

.desc{
  color:var(--muted);
  max-width:700px;
  margin:auto;
}

.buttons{
  margin-top:20px;
}

.btn{
  padding:12px 20px;
  border:1px solid #555;
  border-radius:10px;
  margin:5px;
  text-decoration:none;
  color:#ccc;
}

.btn-primary{
  background:var(--gold);
  color:#000;
  border:none;
}

.status{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  margin-top:30px;
}

.card{
  background:#111;
  padding:20px;
  border-radius:12px;
  text-align:center;
}

.footer{
  margin-top:50px;
  text-align:center;
  color:#777;
}
</style>
</head>

<body>

<div class="wrap">

<div class="topbar">
  <a class="brand" href="#">IBSS</a>

  <div class="nav">
    <a href="index.html" class="active">Home</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="signals.html">Signals</a>
  </div>

  <div class="lang-switch">
    <button onclick="setLang('en')" id="enBtn">EN</button>
    <button onclick="setLang('ar')" id="arBtn">AR</button>
  </div>
</div>

<div class="hero">
  <h1>IBSS</h1>
  <p class="desc">Sovereign Intelligence System</p>

  <div class="buttons">
    <a href="dashboard.html" class="btn btn-primary">Dashboard</a>
    <a href="signals.html" class="btn">Signals</a>
  </div>

  <div class="status">
    <div class="card">
      <div>Top Signal</div>
      <strong id="topSignal">-</strong>
    </div>

    <div class="card">
      <div>System Pressure</div>
      <strong id="pressure">0</strong>
    </div>

    <div class="card">
      <div>Decision</div>
      <strong id="decision">-</strong>
    </div>
  </div>

</div>

<div class="footer">
© 2026 IBSS — Naeem Dahalan
</div>

</div>

<script src="data.js"></script>

<script>
let lang = localStorage.getItem("lang") || "en";

function setLang(l){
  localStorage.setItem("lang", l);
  lang = l;
  render();
}

function render(){
  const system = getSystemState();

  const dominant = system.dominantSignal || IBSS_SIGNALS[0];

  document.getElementById("topSignal").textContent =
    dominant ? dominant.title[lang] : "-";

  document.getElementById("pressure").textContent = system.ssi;

  document.getElementById("decision").textContent = system.decision;

  document.getElementById("enBtn").classList.toggle("active", lang === "en");
  document.getElementById("arBtn").classList.toggle("active", lang === "ar");

  document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";
}

render();
</script>

</body>
      </html>
